<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SENTIO - Page Not Found</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="assets/sentio-favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=sentio-bw-4" />
    <style>
      .not-found {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 40px 18px;
        text-align: center;
      }

      .not-found img {
        width: min(360px, 80vw);
        margin-bottom: 34px;
      }

      .not-found p {
        max-width: 560px;
        margin: 0 auto 24px;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <section>
        <img src="assets/sentio-logo-cropped.png" alt="SENTIO" />
        <p>The page you requested does not exist on the SENTIO website.</p>
        <a class="button primary" href="/">Return home</a>
      </section>
    </main>
  </body>
</html>
